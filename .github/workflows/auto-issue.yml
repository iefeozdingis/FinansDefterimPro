name: Otomatik Issue - CI Hatasında

on:
  workflow_run:
    workflows: ["CI", "Python Tests"]
    types:
      - completed

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Issue Oluştur
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const workflowName = context.payload.workflow_run.name;
            const runUrl = context.payload.workflow_run.html_url;
            const branch = context.payload.workflow_run.head_branch;
            const commitSha = context.payload.workflow_run.head_sha.substring(0, 7);

            const title = `🚨 CI Hatası: ${workflowName} - ${branch} (${commitSha})`;

            const body = `
## CI Çalışması Başarısız Oldu

| Detay | Değer |
|-------|-------|
| **Workflow** | ${workflowName} |
| **Branch** | \`${branch}\` |
| **Commit** | \`${commitSha}\` |
| **Çalışma** | [Görüntüle](${runUrl}) |

CI pipeline'ında bir hata oluştu. Lütfen çalışma detaylarını inceleyip hatayı giderin.
            `.trim();

            // Aynı branch+workflow için zaten açık issue var mı kontrol et
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure'],
            });

            const duplicate = existingIssues.data.find(issue =>
              issue.title.includes(workflowName) && issue.title.includes(branch)
            );

            if (duplicate) {
              console.log(`Zaten açık issue var: #${duplicate.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ci-failure', 'bug'],
            });

            console.log('Issue oluşturuldu.');
