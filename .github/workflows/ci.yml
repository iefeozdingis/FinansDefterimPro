name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install system dependencies (Tk + Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt
      - name: Run tests (headless via Xvfb)
        # Asgari test sayısı kapısı: Tk kurulumu bozulursa test sınıfları
        # sessizce SkipTest'e düşüyor, unittest yine 0 dönüyor ve CI yeşil
        # kalıyordu. Koşan test sayısı beklenenin altına inerse başarısız ol.
        run: |
          set -o pipefail
          xvfb-run -a python -m unittest discover -s tests -v 2>&1 | tee test-output.txt
          KOSAN=$(grep -oP '^Ran \K[0-9]+' test-output.txt)
          ATLANAN=$(grep -oP 'skipped=\K[0-9]+' test-output.txt || echo 0)
          echo "Koşan: $KOSAN, atlanan: $ATLANAN"
          if [ "${KOSAN:-0}" -lt 103 ]; then
            echo "::error::Beklenenden az test koştu ($KOSAN < 103) — testler sessizce atlanmış olabilir"
            exit 1
          fi
          if [ "${ATLANAN:-0}" -gt 2 ]; then
            echo "::error::Çok fazla test atlandı ($ATLANAN) — Tk/ortam kurulumu bozuk olabilir"
            exit 1
          fi
      - name: Lint (flake8)
        run: flake8 --config .flake8 .
      - name: Type check (mypy)
        run: mypy .
