[mypy]
python_version = 3.11
ignore_missing_imports = True
# follow_imports = skip idi: import edilen modülleri (yani ui/* <-> database
# çapraz kullanımını) tip denetiminden tamamen çıkarıyordu. CI'daki `mypy .`
# modüller arası hiçbir imza uyuşmazlığını yakalamıyor, hep yeşil kalıyordu.
follow_imports = normal
# Kurulu paketlerin içine hiç girme: amaç KENDİ modüllerimiz arasındaki
# imza uyuşmazlıklarını yakalamak. Üçüncü parti stub'lar hedef sürümle
# çelişebiliyor (numpy stub'ı 3.12+ sözdizimi kullanıyor) ve bizim
# sorumluluğumuzda değil.
no_site_packages = True
# scripts/ tip denetimi dışında: tek kullanımlık geliştirme araçları,
# uygulama kodu değil. parse_ci_yaml.py yaml'i import ettiği için
# no_site_packages ile birlikte "stub yok" hatası veriyordu.
exclude = (?ix)^(?:\.venv|venv|\.git|__pycache__|scripts)/
show_error_codes = True
warn_unused_configs = True
strict = False
